eureka.client.register-with-eureka=true
eureka.client.fetch-registry= true
eureka.client.service-url.defaultZone = http://localhost:8761/eureka

eureka.instance.prefer-ip-address=true
eureka.instance.hostname=localhost
eureka.instance.instance-id=${spring.application.name}:${server.port}

spring.boot.admin.client.url=http://localhost:9090 


management.endpoints.web.exposure.include= *
management.endpoint.health.show-details= always

spring.application.name=CURRENCYEXCHANGESERVICE

#zipkin details 
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
# Circuit Breaker Configuration

# Sliding Window
resilience4j.circuitbreaker.instances.currency-conversion-service.slidingWindowType=COUNT_BASED
resilience4j.circuitbreaker.instances.currency-conversion-service.slidingWindowSize=10
resilience4j.circuitbreaker.instances.currency-conversion-service.minimumNumberOfCalls=5

# Failure Rate Threshold
resilience4j.circuitbreaker.instances.currency-conversion-service.failureRateThreshold=50

# Wait Duration in OPEN state (in milliseconds)
resilience4j.circuitbreaker.instances.currency-conversion-service.waitDurationInOpenState=30s

# Automatic transition from OPEN to HALF-OPEN
resilience4j.circuitbreaker.instances.currency-conversion-service.automaticTransitionFromOpenToHalfOpenEnabled=true

# Number of calls allowed in HALF-OPEN state
resilience4j.circuitbreaker.instances.currency-conversion-service.permittedNumberOfCallsInHalfOpenState=5

spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=Nanna@143

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true






